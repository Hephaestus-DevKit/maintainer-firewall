name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - name: Pack release asset
        run: |
          mkdir -p release-assets
          npm pack --pack-destination release-assets
      - name: Attest release asset
        id: attest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: release-assets/*.tgz
      - name: Stage attestation bundle
        run: |
          version="${GITHUB_REF_NAME#v}"
          cp "${{ steps.attest.outputs.bundle-path }}" "release-assets/maintainer-firewall-${version}.tgz.sigstore.json"
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          generate_release_notes: true
          files: release-assets/*
